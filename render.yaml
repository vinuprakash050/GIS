services:
  - type: web
    name: gis-mvp-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false          # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.0"
